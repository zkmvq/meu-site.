<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZK Studio — Meu Perfil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue:#1A56DB;--blue-light:#4F8EF7;--blue-bright:#60A5FA;
      --blue-dark:#1239A8;--blue-glow:rgba(96,165,250,0.35);
      --bg:#03081C;--bg2:#050C24;--bg3:#07102E;
      --card:#0B1535;--card-border:#1A2555;--text:#CBD5E1;
      --text-muted:#64748B;--white:#F1F5FF;--green:#22C55E;
      --red:#EF4444;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;}
    *{cursor:none !important;}

    .bg-glow{position:fixed;border-radius:50%;pointer-events:none;filter:blur(140px);z-index:0;}
    .bg-glow-1{width:700px;height:700px;background:rgba(26,86,219,0.07);top:-250px;left:-250px;}
    .bg-glow-2{width:500px;height:500px;background:rgba(26,86,219,0.05);bottom:-200px;right:-200px;}
    .bg-glow-3{width:300px;height:300px;background:rgba(96,165,250,0.04);top:40%;left:60%;}

    .navbar{
      background:rgba(3,8,28,0.85);backdrop-filter:blur(24px);
      border-bottom:1px solid rgba(26,86,219,0.12);
      padding:0.8rem 2.5rem;display:flex;align-items:center;gap:1.2rem;
      position:sticky;top:0;z-index:100;
    }
    .navbar img{height:38px;filter:drop-shadow(0 0 12px rgba(26,86,219,0.3));}
    .nav-links{display:flex;align-items:center;gap:1.5rem;margin-left:auto;}
    .nav-links a{color:var(--text-muted);text-decoration:none;font-size:0.8rem;font-weight:500;transition:color 0.2s;letter-spacing:0.02em;}
    .nav-links a:hover{color:var(--blue-bright);}
    .nav-links a.active{color:var(--blue-bright);}

    .profile-wrap{max-width:880px;margin:0 auto;padding:2.5rem 1.5rem 4rem;position:relative;z-index:1;}

    /* ── HERO ── */
    .profile-hero{
      background:linear-gradient(135deg,var(--card) 0%,rgba(10,20,55,0.9) 100%);
      border:1px solid var(--card-border);border-radius:20px;
      padding:2.5rem 2.5rem 2rem;margin-bottom:2rem;
      position:relative;overflow:hidden;
    }
    .profile-hero::before{
      content:'';position:absolute;top:-80px;right:-80px;
      width:300px;height:300px;border-radius:50%;
      background:radial-gradient(circle,rgba(26,86,219,0.12),transparent 70%);
      pointer-events:none;
    }
    .profile-hero::after{
      content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
      background:linear-gradient(90deg,transparent,rgba(26,86,219,0.3),transparent);
    }
    .hero-top{display:flex;align-items:center;gap:1.8rem;margin-bottom:1.5rem;}
    .avatar-wrap{position:relative;flex-shrink:0;}
    .avatar-ring{
      width:96px;height:96px;border-radius:50%;padding:3px;
      background:linear-gradient(135deg,var(--blue-bright),var(--blue-dark),var(--blue));
      animation:avatarPulse 3s ease-in-out infinite;
    }
    @keyframes avatarPulse{
      0%,100%{box-shadow:0 0 20px rgba(26,86,219,0.3);}
      50%{box-shadow:0 0 35px rgba(26,86,219,0.5);}
    }
    .avatar-inner{
      width:100%;height:100%;border-radius:50%;
      background:linear-gradient(135deg,var(--bg2),var(--bg3));
      display:flex;align-items:center;justify-content:center;
      font-size:2.2rem;font-weight:900;color:var(--blue-bright);
      letter-spacing:-0.02em;
    }
    .hero-info{flex:1;}
    .hero-info h1{
      font-size:1.6rem;font-weight:800;color:var(--white);
      margin-bottom:0.25rem;letter-spacing:-0.01em;
    }
    .hero-email{font-size:0.85rem;color:var(--text-muted);margin-bottom:0.5rem;}
    .hero-since{
      display:inline-flex;align-items:center;gap:0.4rem;
      font-size:0.7rem;color:var(--text-muted);
      font-family:var(--mono);letter-spacing:0.04em;
    }
    .hero-since::before{content:'///';color:var(--blue);font-weight:700;}
    .hero-actions{display:flex;gap:0.6rem;flex-shrink:0;align-self:flex-start;}
    .btn-hero{
      padding:0.55rem 1.2rem;border-radius:10px;font-size:0.78rem;
      font-weight:700;cursor:pointer;transition:all 0.25s;font-family:var(--font);
      letter-spacing:0.03em;border:none;position:relative;overflow:hidden;
    }
    .btn-hero-support{
      background:rgba(26,86,219,0.12);color:var(--blue-bright);
      border:1px solid rgba(26,86,219,0.25);
    }
    .btn-hero-support:hover{background:rgba(26,86,219,0.22);border-color:rgba(26,86,219,0.45);transform:translateY(-1px);}
    .btn-hero-logout{
      background:rgba(239,68,68,0.08);color:#FCA5A5;
      border:1px solid rgba(239,68,68,0.2);
    }
    .btn-hero-logout:hover{background:rgba(239,68,68,0.18);border-color:rgba(239,68,68,0.4);transform:translateY(-1px);}

    .hero-divider{height:1px;background:linear-gradient(90deg,transparent,var(--card-border),transparent);margin-bottom:1.5rem;}

    /* ── BADGES ── */
    .hero-badges{display:flex;gap:0.6rem;flex-wrap:wrap;}
    .badge{
      display:inline-flex;align-items:center;gap:0.35rem;
      padding:0.3rem 0.75rem;border-radius:20px;font-size:0.68rem;
      font-weight:600;letter-spacing:0.03em;
    }
    .badge-discord{
      background:rgba(88,101,242,0.12);color:#7289DA;
      border:1px solid rgba(88,101,242,0.25);
    }
    .badge-local{
      background:rgba(34,197,94,0.1);color:var(--green);
      border:1px solid rgba(34,197,94,0.2);
    }
    .badge-staff{
      background:rgba(251,191,36,0.1);color:#FBBF24;
      border:1px solid rgba(251,191,36,0.25);
    }

    /* ── STATS ── */
    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2.5rem;}
    .stat-card{
      background:var(--card);border:1px solid var(--card-border);border-radius:16px;
      padding:1.5rem;text-align:center;position:relative;overflow:hidden;
      transition:all 0.3s;
    }
    .stat-card:hover{border-color:rgba(26,86,219,0.35);transform:translateY(-3px);}
    .stat-card::before{
      content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
      width:60px;height:2px;border-radius:0 0 2px 2px;
      background:linear-gradient(90deg,transparent,var(--blue),transparent);
    }
    .stat-icon{font-size:1.4rem;margin-bottom:0.6rem;opacity:0.8;}
    .s-num{font-size:2.2rem;font-weight:900;color:var(--white);font-family:var(--mono);line-height:1;}
    .s-label{font-size:0.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.12em;margin-top:0.5rem;font-weight:500;}

    /* ── SEÇÃO ── */
    .section-header{
      display:flex;align-items:center;gap:0.8rem;margin-bottom:1.2rem;
    }
    .section-icon{
      width:32px;height:32px;border-radius:10px;
      background:rgba(26,86,219,0.1);border:1px solid rgba(26,86,219,0.2);
      display:flex;align-items:center;justify-content:center;font-size:0.85rem;
    }
    .section-title{
      font-size:0.95rem;font-weight:700;color:var(--white);
    }
    .section-line{flex:1;height:1px;background:var(--card-border);}

    /* ── COMPRAS ── */
    .purchases-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;margin-bottom:2rem;}
    .purchase-card{
      background:var(--card);border:1px solid var(--card-border);border-radius:16px;
      padding:1.6rem;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      position:relative;overflow:hidden;
    }
    .purchase-card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:3px;
      background:linear-gradient(90deg,var(--blue),var(--blue-bright));
      opacity:0;transition:opacity 0.3s;
    }
    .purchase-card:hover{border-color:rgba(26,86,219,0.4);transform:translateY(-4px);box-shadow:0 12px 40px rgba(26,86,219,0.12);}
    .purchase-card:hover::before{opacity:1;}
    .pc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
    .pc-status{
      display:inline-flex;align-items:center;gap:0.35rem;
      font-size:0.68rem;font-weight:700;color:var(--green);
      background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);
      padding:0.25rem 0.65rem;border-radius:20px;
    }
    .pc-status-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:dotPulse 2s ease-in-out infinite;}
    @keyframes dotPulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
    .pc-icon{
      width:36px;height:36px;border-radius:10px;
      background:linear-gradient(135deg,rgba(26,86,219,0.15),rgba(26,86,219,0.05));
      display:flex;align-items:center;justify-content:center;font-size:1rem;
    }
    .pc-name{font-size:1.05rem;font-weight:700;color:var(--white);margin-bottom:0.35rem;}
    .pc-price{
      font-size:1.3rem;font-weight:800;color:var(--blue-bright);
      font-family:var(--mono);margin-bottom:0.8rem;
      text-shadow:0 0 20px rgba(96,165,250,0.3);
    }
    .pc-date{font-size:0.7rem;color:var(--text-muted);font-family:var(--mono);}

    /* ── EMPTY ── */
    .empty-state{
      background:var(--card);border:1px dashed rgba(26,86,219,0.25);border-radius:16px;
      padding:3.5rem 2rem;text-align:center;margin-bottom:2rem;position:relative;
    }
    .empty-state::before{
      content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      width:120px;height:120px;border-radius:50%;
      background:radial-gradient(circle,rgba(26,86,219,0.06),transparent 70%);
      pointer-events:none;
    }
    .empty-icon{
      width:64px;height:64px;border-radius:16px;margin:0 auto 1.2rem;
      background:linear-gradient(135deg,rgba(26,86,219,0.1),rgba(26,86,219,0.03));
      border:1px solid rgba(26,86,219,0.15);
      display:flex;align-items:center;justify-content:center;font-size:1.8rem;
    }
    .empty-state h3{font-size:1.1rem;font-weight:700;color:var(--white);margin-bottom:0.4rem;}
    .empty-state p{color:var(--text-muted);font-size:0.85rem;margin-bottom:1.5rem;line-height:1.6;}
    .btn-shop{
      display:inline-flex;align-items:center;gap:0.5rem;
      background:linear-gradient(135deg,var(--blue),var(--blue-dark));
      color:#fff;text-decoration:none;
      padding:0.75rem 1.8rem;border-radius:10px;font-size:0.85rem;font-weight:700;
      transition:all 0.25s;letter-spacing:0.03em;
      box-shadow:0 4px 20px rgba(26,86,219,0.3);
    }
    .btn-shop:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(26,86,219,0.45);}

    .loading{text-align:center;padding:4rem;color:var(--text-muted);font-size:0.9rem;}

    @media(max-width:700px){
      .hero-top{flex-direction:column;text-align:center;}
      .hero-actions{align-self:center;}
      .stats-grid{grid-template-columns:1fr;}
      .profile-hero{padding:2rem 1.5rem;}
      .navbar{padding:0.7rem 1.2rem;}
      .nav-links{gap:1rem;}
    }
  </style>
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-glow bg-glow-3"></div>

  <nav class="navbar">
    <img src="/logos/ZK STUDIO SEM FUNDO.png" alt="ZK Studio" />
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/suporte.html">Suporte</a>
      <a href="/profile.html" class="active">Perfil</a>
    </div>
  </nav>

  <div class="profile-wrap" id="profileWrap">
    <div class="loading">Carregando perfil...</div>
  </div>

<script>
  const token = localStorage.getItem('zk_token');
  if (!token) window.location.href = '/auth.html';

  async function loadProfile() {
    try {
      const r = await fetch('/auth/me', { headers:{ Authorization:'Bearer '+token } });
      if (!r.ok) { localStorage.removeItem('zk_token'); window.location.href='/auth.html'; return; }
      const { user, purchases } = await r.json();
      renderProfile(user, purchases);
    } catch {
      document.getElementById('profileWrap').innerHTML = '<div class="loading">Erro ao carregar. Tente novamente.</div>';
    }
  }

  function renderProfile(user, purchases) {
    const initial = user.name.charAt(0).toUpperCase();
    const since = new Date(user.created_at).toLocaleDateString('pt-BR', { year:'numeric', month:'long', day:'numeric' });
    const total = purchases.reduce((s,p) => s + parseFloat((p.price||'0').replace('R$ ','').replace(',','.')||0), 0);
    const active = purchases.filter(p=>p.status==='active').length;
    const method = user.provider === 'discord' ? 'discord' : 'local';

    document.getElementById('profileWrap').innerHTML = `
      <div class="profile-hero">
        <div class="hero-top">
          <div class="avatar-wrap">
            <div class="avatar-ring">
              <div class="avatar-inner">${initial}</div>
            </div>
          </div>
          <div class="hero-info">
            <h1>${esc(user.name)}</h1>
            <div class="hero-email">${esc(user.email)}</div>
            <div class="hero-since">membro desde ${since}</div>
          </div>
          <div class="hero-actions">
            <a href="/suporte.html" class="btn-hero btn-hero-support">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:-2px;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              Suporte
            </a>
            <button class="btn-hero btn-hero-logout" onclick="logout()">Sair</button>
          </div>
        </div>
        <div class="hero-divider"></div>
        <div class="hero-badges">
          ${method === 'discord' ? '<span class="badge badge-discord"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg> Discord</span>' : '<span class="badge badge-local">Email</span>'}
          ${user.is_staff ? '<span class="badge badge-staff">Staff</span>' : ''}
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">📦</div>
          <div class="s-num">${purchases.length}</div>
          <div class="s-label">Scripts Comprados</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">✅</div>
          <div class="s-num">${active}</div>
          <div class="s-label">Ativos</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">💰</div>
          <div class="s-num">R$ ${total.toFixed(2).replace('.',',')}</div>
          <div class="s-label">Total Investido</div>
        </div>
      </div>

      <div class="section-header">
        <div class="section-icon">🛒</div>
        <div class="section-title">Minhas Compras</div>
        <div class="section-line"></div>
      </div>

      ${purchases.length === 0 ? `
        <div class="empty-state">
          <div class="empty-icon">🛒</div>
          <h3>Nenhuma compra ainda</h3>
          <p>Quando você adquirir scripts, eles aparecerão aqui com todas as informações.</p>
          <a href="/#produtos" class="btn-shop">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            Ver Scripts
          </a>
        </div>
      ` : `
        <div class="purchases-grid">
          ${purchases.map(p => {
            const icons = ['⚡','🔧','⚙️','🎮','💻','🚀'];
            const icon = icons[Math.abs(hashStr(p.script_name)) % icons.length];
            return `
              <div class="purchase-card">
                <div class="pc-top">
                  <div class="pc-status"><div class="pc-status-dot"></div> Ativo</div>
                  <div class="pc-icon">${icon}</div>
                </div>
                <div class="pc-name">${esc(p.script_name)}</div>
                <div class="pc-price">${esc(p.price)}</div>
                <div class="pc-date">Comprado em ${new Date(p.purchased_at).toLocaleDateString('pt-BR')}</div>
              </div>`;
          }).join('')}
        </div>
      `}
    `;
  }

  function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return h;}

  function logout() {
    localStorage.removeItem('zk_token');
    localStorage.removeItem('zk_user');
    window.location.href = '/';
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  loadProfile();
</script>
</body>
</html>
