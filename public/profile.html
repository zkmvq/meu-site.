<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZK Studio — Meu Perfil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue:#1A56DB;--blue-light:#4F8EF7;--blue-bright:#60A5FA;
      --blue-dark:#1239A8;--bg:#03081C;--bg2:#050C24;--bg3:#07102E;
      --card:#081230;--card-border:#162050;--text:#CBD5E1;
      --text-muted:#64748B;--white:#F1F5FF;--green:#22C55E;
      --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
    .bg-glow{position:fixed;border-radius:50%;pointer-events:none;filter:blur(120px);z-index:0;}
    .bg-glow-1{width:600px;height:600px;background:rgba(26,86,219,0.08);top:-200px;left:-200px;}
    .bg-glow-2{width:500px;height:500px;background:rgba(26,86,219,0.06);bottom:-150px;right:-150px;}

    /* NAVBAR */
    .navbar{background:rgba(3,8,28,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(26,86,219,0.15);padding:0.7rem 2rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100;}
    .navbar img{height:40px;}
    .navbar a{color:var(--text-muted);text-decoration:none;font-size:0.82rem;margin-left:auto;transition:color 0.2s;}
    .navbar a:hover{color:var(--blue-bright);}

    /* LAYOUT */
    .profile-wrap{max-width:900px;margin:0 auto;padding:3rem 1.5rem;position:relative;z-index:1;}

    /* HERO PERFIL */
    .profile-hero{
      background:var(--card);border:1px solid var(--card-border);border-radius:18px;
      padding:2rem;display:flex;align-items:center;gap:2rem;margin-bottom:2rem;
      position:relative;overflow:hidden;
    }
    .profile-hero::before{
      content:'';position:absolute;inset:0;
      background:linear-gradient(135deg,rgba(26,86,219,0.08),transparent);
      pointer-events:none;
    }
    .profile-avatar{
      width:80px;height:80px;border-radius:50%;flex-shrink:0;
      background:linear-gradient(135deg,var(--blue),var(--blue-dark));
      display:flex;align-items:center;justify-content:center;
      font-size:2rem;font-weight:800;color:#fff;
      box-shadow:0 0 30px rgba(26,86,219,0.4);
    }
    .profile-info h2{font-size:1.5rem;font-weight:800;color:var(--white);margin-bottom:0.3rem;}
    .profile-info p{font-size:0.85rem;color:var(--text-muted);}
    .profile-info .since{font-size:0.75rem;color:var(--text-muted);margin-top:0.5rem;font-family:var(--mono);}
    .btn-logout{
      margin-left:auto;background:rgba(239,68,68,0.12);color:#FCA5A5;
      border:1px solid rgba(239,68,68,0.25);padding:0.5rem 1.2rem;
      border-radius:8px;font-size:0.8rem;font-weight:700;cursor:pointer;
      transition:all 0.2s;font-family:var(--font);
    }
    .btn-logout:hover{background:rgba(239,68,68,0.22);}
    .btn-support{
      background:rgba(26,86,219,0.12);color:var(--blue-bright);
      border:1px solid rgba(26,86,219,0.25);padding:0.5rem 1.2rem;
      border-radius:8px;font-size:0.8rem;font-weight:700;cursor:pointer;
      transition:all 0.2s;font-family:var(--font);text-decoration:none;
    }
    .btn-support:hover{background:rgba(26,86,219,0.22);}

    /* SEÇÕES */
    .section-title{
      font-size:0.72rem;font-weight:700;color:var(--text-muted);
      letter-spacing:0.14em;text-transform:uppercase;
      margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem;
    }
    .section-title::after{content:'';flex:1;height:1px;background:var(--card-border);}

    /* COMPRAS */
    .purchases-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;margin-bottom:2rem;}
    .purchase-card{
      background:var(--card);border:1px solid var(--card-border);border-radius:14px;
      padding:1.5rem;transition:all 0.25s;
    }
    .purchase-card:hover{border-color:rgba(26,86,219,0.4);transform:translateY(-3px);}
    .purchase-card .pc-name{font-size:1rem;font-weight:700;color:var(--white);margin-bottom:0.4rem;}
    .purchase-card .pc-price{font-size:1.2rem;font-weight:800;color:var(--blue-bright);font-family:var(--mono);margin-bottom:0.8rem;}
    .purchase-card .pc-date{font-size:0.72rem;color:var(--text-muted);}
    .purchase-card .pc-status{
      display:inline-flex;align-items:center;gap:0.4rem;
      font-size:0.7rem;font-weight:700;color:var(--green);
      background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.25);
      padding:0.2rem 0.6rem;border-radius:20px;margin-bottom:0.8rem;
    }
    .pc-status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);}

    .empty-purchases{
      background:var(--card);border:1px solid var(--card-border);border-radius:14px;
      padding:3rem;text-align:center;margin-bottom:2rem;
    }
    .empty-purchases .ep-icon{font-size:3rem;opacity:0.4;margin-bottom:1rem;}
    .empty-purchases p{color:var(--text-muted);font-size:0.9rem;margin-bottom:1.2rem;}
    .btn-shop{
      display:inline-flex;align-items:center;gap:0.5rem;
      background:var(--blue);color:#fff;text-decoration:none;
      padding:0.7rem 1.5rem;border-radius:8px;font-size:0.85rem;font-weight:700;
      transition:all 0.2s;
    }
    .btn-shop:hover{background:var(--blue-dark);box-shadow:0 0 20px rgba(26,86,219,0.4);}

    /* STATS */
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem;}
    .stat-card{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:1.2rem;text-align:center;}
    .stat-card .s-num{font-size:2rem;font-weight:900;color:var(--blue-bright);font-family:var(--mono);}
    .stat-card .s-label{font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;margin-top:0.3rem;}

    .loading{text-align:center;padding:4rem;color:var(--text-muted);}
  </style>
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <nav class="navbar">
    <img src="/logos/ZK STUDIO SEM FUNDO.png" alt="ZK Studio" />
    <a href="/suporte.html">Suporte</a>
    <a href="/">← Voltar ao site</a>
  </nav>

  <div class="profile-wrap" id="profileWrap">
    <div class="loading">Carregando perfil...</div>
  </div>

<script>
  const token = localStorage.getItem('zk_token');
  if (!token) window.location.href = '/auth.html';

  async function loadProfile() {
    try {
      const r = await fetch('/auth/me', { headers:{ Authorization:'Bearer '+token } });
      if (!r.ok) { localStorage.removeItem('zk_token'); window.location.href='/auth.html'; return; }
      const { user, purchases } = await r.json();
      renderProfile(user, purchases);
    } catch {
      document.getElementById('profileWrap').innerHTML = '<div class="loading">Erro ao carregar. Tente novamente.</div>';
    }
  }

  function renderProfile(user, purchases) {
    const initial = user.name.charAt(0).toUpperCase();
    const since   = new Date(user.created_at).toLocaleDateString('pt-BR', { year:'numeric', month:'long', day:'numeric' });
    const total   = purchases.reduce((s,p) => s + parseFloat(p.price.replace('R$ ','').replace(',','.')||0), 0);

    document.getElementById('profileWrap').innerHTML = `
      <div class="profile-hero">
        <div class="profile-avatar">${initial}</div>
        <div class="profile-info">
          <h2>${esc(user.name)}</h2>
          <p>${esc(user.email)}</p>
          <div class="since">// membro desde ${since}</div>
        </div>
        <a href="/suporte.html" class="btn-support">Suporte</a>
        <button class="btn-logout" onclick="logout()">Sair</button>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="s-num">${purchases.length}</div>
          <div class="s-label">Scripts Comprados</div>
        </div>
        <div class="stat-card">
          <div class="s-num">${purchases.filter(p=>p.status==='active').length}</div>
          <div class="s-label">Ativos</div>
        </div>
        <div class="stat-card">
          <div class="s-num">R$ ${total.toFixed(2).replace('.',',')}</div>
          <div class="s-label">Total Investido</div>
        </div>
      </div>

      <div class="section-title">Minhas Compras</div>

      ${purchases.length === 0 ? `
        <div class="empty-purchases">
          <div class="ep-icon">🛒</div>
          <p>Você ainda não comprou nenhum script.</p>
          <a href="/#produtos" class="btn-shop">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            Ver Scripts
          </a>
        </div>
      ` : `
        <div class="purchases-grid">
          ${purchases.map(p => `
            <div class="purchase-card">
              <div class="pc-status"><div class="pc-status-dot"></div> Ativo</div>
              <div class="pc-name">${esc(p.script_name)}</div>
              <div class="pc-price">${esc(p.price)}</div>
              <div class="pc-date">Comprado em ${new Date(p.purchased_at).toLocaleDateString('pt-BR')}</div>
            </div>
          `).join('')}
        </div>
      `}
    `;
  }

  function logout() {
    localStorage.removeItem('zk_token');
    localStorage.removeItem('zk_user');
    window.location.href = '/';
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  loadProfile();
</script>
</body>
</html>
