<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZK Studio — Meu Perfil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue:#1A56DB;--blue-light:#4F8EF7;--blue-bright:#60A5FA;
      --blue-dark:#1239A8;--blue-glow:rgba(96,165,250,0.35);
      --bg:#03081C;--bg2:#050C24;--bg3:#07102E;
      --card:#0B1535;--card-border:#1A2555;--text:#CBD5E1;
      --text-muted:#64748B;--white:#F1F5FF;--green:#22C55E;
      --red:#EF4444;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;}
    *{cursor:none !important;}
    #cursor-dot {
      position:fixed; top:0; left:0; width:7px; height:7px;
      background:#fff; border-radius:50%; pointer-events:none;
      z-index:999999; transform:translate(-50%,-50%);
      transition:width 0.15s, height 0.15s, background 0.15s;
    }
    body.cursor-hover #cursor-dot { width:10px; height:10px; background:var(--blue-bright); }
    body.cursor-click #cursor-dot  { width:5px; height:5px; }

    .bg-glow{position:fixed;border-radius:50%;pointer-events:none;filter:blur(140px);z-index:0;}
    .bg-glow-1{width:700px;height:700px;background:rgba(26,86,219,0.07);top:-250px;left:-250px;}
    .bg-glow-2{width:500px;height:500px;background:rgba(26,86,219,0.05);bottom:-200px;right:-200px;}

    .navbar{
      background:rgba(3,8,28,0.85);backdrop-filter:blur(24px);
      border-bottom:1px solid rgba(26,86,219,0.12);
      padding:0.8rem 2.5rem;display:flex;align-items:center;gap:1.2rem;
      position:sticky;top:0;z-index:100;
    }
    .navbar img{height:38px;filter:drop-shadow(0 0 12px rgba(26,86,219,0.3));}
    .nav-links{display:flex;align-items:center;gap:1.5rem;margin-left:auto;}
    .nav-links a{color:var(--text-muted);text-decoration:none;font-size:0.8rem;font-weight:500;transition:color 0.2s;}
    .nav-links a:hover{color:var(--blue-bright);}
    .nav-links a.active{color:var(--blue-bright);}

    .profile-wrap{max-width:960px;margin:0 auto;padding:2.5rem 1.5rem 4rem;position:relative;z-index:1;}

    /* ── HERO ── */
    .profile-hero{
      background:rgba(11,21,53,0.55);
      backdrop-filter:blur(20px) saturate(1.4);
      -webkit-backdrop-filter:blur(20px) saturate(1.4);
      border:1px solid rgba(26,86,219,0.18);border-radius:24px;
      padding:0;margin-bottom:2rem;
      position:relative;overflow:hidden;
      box-shadow:0 8px 40px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .profile-hero::before{
      content:'';position:absolute;top:0;left:0;right:0;height:1px;
      background:linear-gradient(90deg,transparent,rgba(96,165,250,0.3),transparent);
    }
    .hero-banner{
      height:160px;position:relative;overflow:hidden;
      background:linear-gradient(135deg,rgba(26,86,219,0.3),rgba(18,57,168,0.18),rgba(3,8,28,0.7));
    }
    .hero-banner::before{
      content:'';position:absolute;inset:0;
      background:radial-gradient(ellipse at 30% 50%,rgba(96,165,250,0.18),transparent 70%);
    }
    .hero-banner::after{
      content:'';position:absolute;bottom:0;left:0;right:0;height:80px;
      background:linear-gradient(transparent,rgba(11,21,53,0.55));
    }
    .banner-pattern{
      position:absolute;inset:0;
      background-image:
        radial-gradient(circle at 20% 30%,rgba(96,165,250,0.08) 1px,transparent 1px),
        radial-gradient(circle at 80% 60%,rgba(96,165,250,0.06) 1px,transparent 1px);
      background-size:40px 40px,30px 30px;
    }
    .banner-glow{
      position:absolute;width:200px;height:200px;border-radius:50%;
      background:radial-gradient(circle,rgba(96,165,250,0.2),transparent 70%);
      top:-60px;left:20%;filter:blur(40px);
      animation:bannerGlow 6s ease-in-out infinite alternate;
    }
    @keyframes bannerGlow{0%{transform:translateX(0) scale(1);}100%{transform:translateX(60px) scale(1.2);}}
    .banner-dots{position:absolute;top:20px;right:20px;display:flex;gap:6px;}
    .banner-dots span{width:8px;height:8px;border-radius:50%;opacity:0.5;}
    .banner-dots span:nth-child(1){background:#3B82F6;}
    .banner-dots span:nth-child(2){background:#60A5FA;}
    .banner-dots span:nth-child(3){background:#93C5FD;}

    .hero-content{padding:0 2.5rem 2rem;position:relative;}
    .avatar-section{display:flex;align-items:flex-end;gap:1.5rem;margin-top:-54px;margin-bottom:1.5rem;}
    .avatar-wrap{position:relative;flex-shrink:0;}
    .avatar-ring{
      width:114px;height:114px;border-radius:50%;padding:4px;
      background:linear-gradient(135deg,var(--blue-bright),var(--blue-dark),var(--blue));
      animation:avatarPulse 3s ease-in-out infinite;
      box-shadow:0 0 0 4px var(--bg);
    }
    .avatar-ring.has-avatar{
      background:linear-gradient(135deg,#5865F2,#4338CA,var(--blue-dark));
    }
    @keyframes avatarPulse{
      0%,100%{box-shadow:0 0 0 4px var(--bg),0 0 20px rgba(26,86,219,0.3);}
      50%{box-shadow:0 0 0 4px var(--bg),0 0 40px rgba(88,101,242,0.5);}
    }
    .avatar-inner{
      width:100%;height:100%;border-radius:50%;
      background:linear-gradient(135deg,var(--bg2),var(--bg3));
      display:flex;align-items:center;justify-content:center;
      font-size:2.5rem;font-weight:900;color:var(--blue-bright);
      overflow:hidden;
    }
    .avatar-inner img{width:100%;height:100%;object-fit:cover;}
    .avatar-online{
      position:absolute;bottom:8px;right:8px;width:18px;height:18px;
      border-radius:50%;background:var(--green);border:3px solid rgba(11,21,53,0.8);
      animation:onlinePulse 2s ease-in-out infinite;
    }
    @keyframes onlinePulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.4);}50%{box-shadow:0 0 0 6px rgba(34,197,94,0);}}

    .hero-info{flex:1;padding-bottom:4px;}
    .hero-info h1{font-size:1.8rem;font-weight:800;color:var(--white);letter-spacing:-0.02em;line-height:1.2;}
    .hero-email{font-size:0.85rem;color:var(--text-muted);margin-top:0.25rem;}
    .hero-since{
      display:inline-flex;align-items:center;gap:0.4rem;
      font-size:0.7rem;color:var(--text-muted);
      font-family:var(--mono);letter-spacing:0.04em;margin-top:0.4rem;
    }
    .hero-since::before{content:'///';color:var(--blue);font-weight:700;}

    .hero-actions{display:flex;gap:0.6rem;flex-shrink:0;align-self:flex-end;}
    .btn-hero{
      padding:0.6rem 1.3rem;border-radius:10px;font-size:0.78rem;
      font-weight:700;cursor:pointer;transition:all 0.25s;font-family:var(--font);
      letter-spacing:0.03em;border:none;position:relative;overflow:hidden;
    }
    .btn-hero-support{
      background:rgba(26,86,219,0.12);color:var(--blue-bright);
      border:1px solid rgba(26,86,219,0.25);
      backdrop-filter:blur(8px);
    }
    .btn-hero-support:hover{background:rgba(26,86,219,0.22);border-color:rgba(26,86,219,0.45);transform:translateY(-1px);box-shadow:0 4px 16px rgba(26,86,219,0.2);}
    .btn-hero-logout{
      background:rgba(239,68,68,0.08);color:#FCA5A5;
      border:1px solid rgba(239,68,68,0.2);
    }
    .btn-hero-logout:hover{background:rgba(239,68,68,0.18);border-color:rgba(239,68,68,0.4);transform:translateY(-1px);}

    .hero-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(26,86,219,0.25),transparent);margin:0 2.5rem 1.2rem;}

    /* ── BADGES ── */
    .hero-badges{display:flex;gap:0.6rem;flex-wrap:wrap;padding:0 2.5rem 1.8rem;}
    .badge{
      display:inline-flex;align-items:center;gap:0.35rem;
      padding:0.3rem 0.75rem;border-radius:20px;font-size:0.68rem;
      font-weight:600;letter-spacing:0.03em;
      backdrop-filter:blur(6px);
    }
    .badge-discord{
      background:rgba(88,101,242,0.12);color:#7289DA;
      border:1px solid rgba(88,101,242,0.25);
    }
    .badge-local{
      background:rgba(34,197,94,0.1);color:var(--green);
      border:1px solid rgba(34,197,94,0.2);
    }
    .badge-staff{
      background:rgba(251,191,36,0.1);color:#FBBF24;
      border:1px solid rgba(251,191,36,0.25);
    }
    .badge-id{
      background:rgba(26,86,219,0.1);color:var(--blue-bright);
      border:1px solid rgba(26,86,219,0.2);font-family:var(--mono);
    }
    .badge-handmade{
      background:rgba(236,72,153,0.1);color:#F472B6;
      border:1px solid rgba(236,72,153,0.25);
    }
    .badge-handmade svg{opacity:0.8;}

    /* ── DISCORD INFO ── */
    .discord-card{
      background:linear-gradient(135deg,rgba(88,101,242,0.08),rgba(88,101,242,0.02));
      border:1px solid rgba(88,101,242,0.2);border-radius:16px;
      padding:1.5rem;margin-bottom:2rem;
      display:grid;grid-template-columns:auto 1fr auto;gap:1.2rem;align-items:center;
      backdrop-filter:blur(8px);
      transition:all 0.3s;
    }
    .discord-card:hover{border-color:rgba(88,101,242,0.35);box-shadow:0 8px 30px rgba(88,101,242,0.1);}
    .dc-icon{
      width:50px;height:50px;border-radius:14px;
      background:rgba(88,101,242,0.15);border:1px solid rgba(88,101,242,0.25);
      display:flex;align-items:center;justify-content:center;
      transition:transform 0.3s;
    }
    .discord-card:hover .dc-icon{transform:scale(1.05);}
    .dc-icon svg{color:#5865F2;}
    .dc-info h3{font-size:0.95rem;font-weight:700;color:var(--white);margin-bottom:0.2rem;}
    .dc-info p{font-size:0.78rem;color:var(--text-muted);}
    .dc-info p span{color:#7289DA;font-weight:600;}
    .dc-status{
      display:flex;align-items:center;gap:0.5rem;
      padding:0.4rem 0.8rem;border-radius:20px;
      background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);
      font-size:0.7rem;font-weight:600;color:var(--green);
    }
    .dc-status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:dotPulse 2s ease-in-out infinite;}
    @keyframes dotPulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

    /* ── STATS ── */
    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2.5rem;}
    .stat-card{
      background:rgba(11,21,53,0.6);
      backdrop-filter:blur(12px);
      border:1px solid rgba(26,86,219,0.15);border-radius:18px;
      padding:1.6rem 1.2rem;text-align:center;position:relative;overflow:hidden;
      transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    .stat-card:hover{border-color:rgba(26,86,219,0.4);transform:translateY(-5px);box-shadow:0 12px 40px rgba(26,86,219,0.12);}
    .stat-card::before{
      content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
      width:60px;height:2px;border-radius:0 0 2px 2px;
      background:linear-gradient(90deg,transparent,var(--blue),transparent);
    }
    .stat-card::after{
      content:'';position:absolute;inset:0;
      background:radial-gradient(circle at 50% 0%,rgba(26,86,219,0.06),transparent 70%);
      pointer-events:none;
    }
    .stat-icon{
      width:50px;height:50px;border-radius:14px;margin:0 auto 0.8rem;
      background:linear-gradient(135deg,rgba(26,86,219,0.18),rgba(26,86,219,0.04));
      border:1px solid rgba(26,86,219,0.22);
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 6px 20px rgba(26,86,219,0.15),0 2px 6px rgba(0,0,0,0.2);
      animation:iconFloat 3s ease-in-out infinite;
      transition:transform 0.3s;
    }
    .stat-card:hover .stat-icon{transform:translateY(-2px) scale(1.05);}
    .stat-card:nth-child(2) .stat-icon{animation-delay:0.4s;}
    .stat-card:nth-child(3) .stat-icon{animation-delay:0.8s;}
    @keyframes iconFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
    .stat-icon svg{width:22px;height:22px;color:var(--blue-bright);}
    .s-num{font-size:2.2rem;font-weight:900;color:var(--white);font-family:var(--mono);line-height:1;}
    .s-label{font-size:0.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.12em;margin-top:0.5rem;font-weight:500;}

    /* ── SECTION ── */
    .section-header{
      display:flex;align-items:center;gap:0.8rem;margin-bottom:1.2rem;
    }
    .section-icon{
      width:34px;height:34px;border-radius:10px;
      background:linear-gradient(135deg,rgba(26,86,219,0.15),rgba(26,86,219,0.04));
      border:1px solid rgba(26,86,219,0.2);
      display:flex;align-items:center;justify-content:center;
    }
    .section-icon svg{width:16px;height:16px;color:var(--blue-bright);}
    .section-title{font-size:0.95rem;font-weight:700;color:var(--white);}
    .section-line{flex:1;height:1px;background:linear-gradient(90deg,var(--card-border),transparent);}

    /* ── PURCHASES ── */
    .purchases-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;margin-bottom:2rem;}
    .purchase-card{
      background:rgba(11,21,53,0.6);
      backdrop-filter:blur(12px);
      border:1px solid rgba(26,86,219,0.15);border-radius:18px;
      overflow:hidden;transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);
      position:relative;
    }
    .purchase-card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:1px;
      background:linear-gradient(90deg,transparent,rgba(96,165,250,0.2),transparent);
      z-index:1;
    }
    .purchase-card:hover{border-color:rgba(26,86,219,0.45);transform:translateY(-5px);box-shadow:0 16px 50px rgba(26,86,219,0.15);}
    .pc-image{height:150px;position:relative;overflow:hidden;background:linear-gradient(135deg,rgba(26,86,219,0.1),rgba(26,86,219,0.02));}
    .pc-image img{width:100%;height:100%;object-fit:cover;object-position:center;transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1);}
    .purchase-card:hover .pc-image img{transform:scale(1.08);}
    .pc-image::after{
      content:'';position:absolute;bottom:0;left:0;right:0;height:60px;
      background:linear-gradient(transparent,rgba(11,21,53,0.6));
    }
    .pc-body{padding:1.2rem 1.5rem 1.5rem;}
    .pc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.6rem;}
    .pc-status{
      display:inline-flex;align-items:center;gap:0.35rem;
      font-size:0.68rem;font-weight:700;color:var(--green);
      background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);
      padding:0.25rem 0.65rem;border-radius:20px;
    }
    .pc-status-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:dotPulse 2s ease-in-out infinite;}
    .pc-icon{
      width:38px;height:38px;border-radius:12px;
      background:linear-gradient(135deg,rgba(26,86,219,0.15),rgba(26,86,219,0.04));
      border:1px solid rgba(26,86,219,0.2);
      display:flex;align-items:center;justify-content:center;
      transition:transform 0.3s;
    }
    .purchase-card:hover .pc-icon{transform:rotate(8deg) scale(1.1);}
    .pc-icon svg{width:18px;height:18px;color:var(--blue-bright);}
    .pc-name{font-size:1.05rem;font-weight:700;color:var(--white);margin-bottom:0.3rem;}
    .pc-price{
      font-size:1.3rem;font-weight:800;color:var(--blue-bright);
      font-family:var(--mono);margin-bottom:0.6rem;
      text-shadow:0 0 20px rgba(96,165,250,0.3);
    }
    .pc-footer{display:flex;align-items:center;justify-content:space-between;}
    .pc-date{font-size:0.7rem;color:var(--text-muted);font-family:var(--mono);}
    .pc-download{
      display:inline-flex;align-items:center;gap:0.3rem;
      padding:0.35rem 0.8rem;border-radius:8px;font-size:0.7rem;font-weight:700;
      background:rgba(26,86,219,0.12);color:var(--blue-bright);
      border:1px solid rgba(26,86,219,0.2);transition:all 0.25s;cursor:pointer;text-decoration:none;
    }
    .pc-download:hover{background:rgba(26,86,219,0.22);border-color:rgba(26,86,219,0.45);transform:translateY(-1px);box-shadow:0 4px 16px rgba(26,86,219,0.15);}

    /* ── EMPTY ── */
    .empty-state{
      background:rgba(11,21,53,0.45);
      backdrop-filter:blur(12px);
      border:1px dashed rgba(26,86,219,0.25);border-radius:18px;
      padding:3.5rem 2rem;text-align:center;margin-bottom:2rem;position:relative;
      overflow:hidden;
    }
    .empty-state::before{
      content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      width:120px;height:120px;border-radius:50%;
      background:radial-gradient(circle,rgba(26,86,219,0.06),transparent 70%);
    }
    .empty-icon{
      width:72px;height:72px;border-radius:18px;margin:0 auto 1.2rem;
      background:linear-gradient(135deg,rgba(26,86,219,0.15),rgba(26,86,219,0.04));
      border:1px solid rgba(26,86,219,0.2);
      display:flex;align-items:center;justify-content:center;
      animation:iconFloat 3s ease-in-out infinite;
    }
    .empty-icon svg{width:30px;height:30px;color:var(--blue-bright);}
    .empty-state h3{font-size:1.1rem;font-weight:700;color:var(--white);margin-bottom:0.4rem;}
    .empty-state p{color:var(--text-muted);font-size:0.85rem;margin-bottom:1.5rem;line-height:1.6;}
    .btn-shop{
      display:inline-flex;align-items:center;gap:0.5rem;
      background:linear-gradient(135deg,var(--blue),var(--blue-dark));
      color:#fff;text-decoration:none;
      padding:0.75rem 1.8rem;border-radius:10px;font-size:0.85rem;font-weight:700;
      transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow:0 4px 20px rgba(26,86,219,0.3);
    }
    .btn-shop:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 8px 30px rgba(26,86,219,0.45);}

    /* ── FOOTER ── */
    .profile-footer{
      margin-top:3rem;padding-top:1.5rem;
      border-top:1px solid rgba(26,86,219,0.12);
      display:flex;align-items:center;justify-content:center;gap:0.5rem;
      font-size:0.7rem;color:var(--text-muted);
    }
    .profile-footer svg{opacity:0.5;}
    .profile-footer a{color:var(--blue-bright);text-decoration:none;font-weight:600;transition:color 0.2s;}
    .profile-footer a:hover{color:var(--blue-light);}

    .loading{text-align:center;padding:4rem;color:var(--text-muted);font-size:0.9rem;}

    /* ── ANIMATIONS ── */
    @keyframes fadeSlideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    .animate-in{animation:fadeSlideUp 0.5s ease-out forwards;opacity:0;}
    .animate-in:nth-child(1){animation-delay:0.05s;}
    .animate-in:nth-child(2){animation-delay:0.1s;}
    .animate-in:nth-child(3){animation-delay:0.15s;}
    .animate-in:nth-child(4){animation-delay:0.2s;}
    .animate-in:nth-child(5){animation-delay:0.25s;}

    @media(max-width:700px){
      .avatar-section{flex-direction:column;align-items:center;text-align:center;}
      .hero-actions{align-self:center;}
      .stats-grid{grid-template-columns:1fr;}
      .hero-content{padding:0 1.5rem 2rem;}
      .hero-badges{padding:0 1.5rem 1.5rem;}
      .hero-divider{margin:0 1.5rem 1.2rem;}
      .navbar{padding:0.7rem 1.2rem;}
      .nav-links{gap:1rem;}
      .purchases-grid{grid-template-columns:1fr;}
      .discord-card{grid-template-columns:1fr;text-align:center;justify-items:center;}
    }
  </style>
</head>
<body>
  <div id="cursor-dot"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <nav class="navbar">
    <img src="/logos/ZK STUDIO SEM FUNDO.png" alt="ZK Studio" />
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/suporte.html">Suporte</a>
      <a href="/profile.html" class="active">Perfil</a>
    </div>
  </nav>

  <div class="profile-wrap" id="profileWrap">
    <div class="loading">Carregando perfil...</div>
  </div>

<script>
  const token = localStorage.getItem('zk_token');
  if (!token) window.location.href = '/auth.html';

  const productImages = {
    'PAINEL ADMIN': '/produtos/paineis.png',
    'PAINEL PUNIÇÃO': '/produtos/prisao.png',
    'PAINEL STREAMER': '/produtos/economy.png',
    'Sistema Peds': '/produtos/peds.png',
    'Anti-cheater': '/produtos/anticheter.png'
  };

  const productSvgs = {
    'PAINEL ADMIN': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>',
    'PAINEL PUNIÇÃO': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
    'PAINEL STREAMER': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>',
    'Sistema Peds': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
    'Anti-cheater': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>'
  };

  async function loadProfile() {
    try {
      const r = await fetch('/auth/me', { headers:{ Authorization:'Bearer '+token } });
      if (!r.ok) { localStorage.removeItem('zk_token'); window.location.href='/auth.html'; return; }
      const { user, purchases } = await r.json();
      renderProfile(user, purchases);
    } catch {
      document.getElementById('profileWrap').innerHTML = '<div class="loading">Erro ao carregar. Tente novamente.</div>';
    }
  }

  function renderProfile(user, purchases) {
    const isDiscord = user.provider === 'discord' || user.discord_id;
    const hasAvatar = user.avatar && user.avatar.includes('discordapp');
    const initial = user.name.charAt(0).toUpperCase();
    const since = new Date(user.created_at).toLocaleDateString('pt-BR', { year:'numeric', month:'long', day:'numeric' });
    const total = purchases.reduce((s,p) => s + parseFloat((p.price||'0').replace('R$ ','').replace(',','.')||0), 0);
    const active = purchases.filter(p=>p.status==='active').length;

    document.getElementById('profileWrap').innerHTML = `
      <div class="profile-hero animate-in">
        <div class="hero-banner">
          <div class="banner-pattern"></div>
          <div class="banner-glow"></div>
          <div class="banner-dots"><span></span><span></span><span></span></div>
        </div>
        <div class="hero-content">
          <div class="avatar-section">
            <div class="avatar-wrap">
              <div class="avatar-ring ${hasAvatar ? 'has-avatar' : ''}">
                <div class="avatar-inner">
                  ${hasAvatar ? '<img src="'+esc(user.avatar)+'" alt="'+esc(user.name)+'" />' : initial}
                </div>
              </div>
              <div class="avatar-online"></div>
            </div>
            <div class="hero-info">
              <h1>${esc(user.name)}</h1>
              <div class="hero-email">${esc(user.email)}</div>
              <div class="hero-since">membro desde ${since}</div>
            </div>
            <div class="hero-actions">
              <a href="/suporte.html" class="btn-hero btn-hero-support">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:-2px;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                Suporte
              </a>
              <button class="btn-hero btn-hero-logout" onclick="logout()">Sair</button>
            </div>
          </div>
        </div>
        <div class="hero-divider"></div>
        <div class="hero-badges">
          ${isDiscord ? '<span class="badge badge-discord"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg> Conectado com Discord</span>'
            : '<span class="badge badge-local">Conta Local</span>'}
          ${user.is_staff ? '<span class="badge badge-staff">Staff</span>' : ''}
          ${user.discord_id ? '<span class="badge badge-id">ID: '+esc(user.discord_id)+'</span>' : ''}
          <span class="badge badge-handmade">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
            Feito com dedicação
          </span>
        </div>
      </div>

      ${isDiscord ? `
      <div class="discord-card animate-in">
        <div class="dc-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
        </div>
        <div class="dc-info">
          <h3>${esc(user.name)}</h3>
          <p>Conectado via <span>Discord</span> — ID: <span>${esc(user.discord_id)}</span></p>
        </div>
        <div class="dc-status"><div class="dc-status-dot"></div> Conectado</div>
      </div>
      ` : ''}

      <div class="stats-grid">
        <div class="stat-card animate-in">
          <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></div>
          <div class="s-num">${purchases.length}</div>
          <div class="s-label">Scripts Comprados</div>
        </div>
        <div class="stat-card animate-in">
          <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
          <div class="s-num">${active}</div>
          <div class="s-label">Ativos</div>
        </div>
        <div class="stat-card animate-in">
          <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
          <div class="s-num">R$ ${total.toFixed(2).replace('.',',')}</div>
          <div class="s-label">Total Investido</div>
        </div>
      </div>

      <div class="section-header animate-in">
        <div class="section-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div>
        <div class="section-title">Biblioteca de Scripts</div>
        <div class="section-line"></div>
      </div>

      ${purchases.length === 0 ? `
        <div class="empty-state animate-in">
          <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div>
          <h3>Nenhum script ainda</h3>
          <p>Quando você adquirir scripts, eles aparecerão aqui na sua biblioteca pessoal.</p>
          <a href="/#produtos" class="btn-shop">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            Ver Scripts
          </a>
        </div>
      ` : `
        <div class="purchases-grid">
          ${purchases.map((p,i) => {
            const img = productImages[p.script_name] || '';
            const icon = productSvgs[p.script_name] || '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/></svg>';
            return `
              <div class="purchase-card animate-in" style="animation-delay:${0.1 + i*0.07}s">
                <div class="pc-image">
                  ${img ? '<img src="'+img+'" alt="'+esc(p.script_name)+'" onerror="this.style.display=\'none\'" />' : ''}
                </div>
                <div class="pc-body">
                  <div class="pc-top">
                    <div class="pc-status"><div class="pc-status-dot"></div> Ativo</div>
                    <div class="pc-icon">${icon}</div>
                  </div>
                  <div class="pc-name">${esc(p.script_name)}</div>
                  <div class="pc-price">${esc(p.price)}</div>
                  <div class="pc-footer">
                    <div class="pc-date">${new Date(p.purchased_at).toLocaleDateString('pt-BR')}</div>
                    <span class="pc-download">
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                      Abrir Ticket
                    </span>
                  </div>
                </div>
              </div>`;
          }).join('')}
        </div>
      `}

      <div class="profile-footer">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
        Desenvolvido com dedicacao por <a href="/">ZK Studio</a> — Sem uso de IA
      </div>
    `;
  }

  function logout() {
    localStorage.removeItem('zk_token');
    localStorage.removeItem('zk_user');
    window.location.href = '/';
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadProfile();

  const dot = document.getElementById('cursor-dot');
  if (dot) {
    let mx = innerWidth / 2, my = innerHeight / 2;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; dot.style.left = mx + 'px'; dot.style.top = my + 'px'; });
    document.addEventListener('mouseleave', () => { dot.style.opacity = '0'; });
    document.addEventListener('mouseenter', () => { dot.style.opacity = '1'; });
    document.querySelectorAll('a,button,.purchase-card').forEach(el => {
      el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
      el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
    });
  }
</script>
</body>
</html>
