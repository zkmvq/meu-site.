<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZK Studio — Entrar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue:#1A56DB; --blue-light:#4F8EF7; --blue-bright:#60A5FA;
      --blue-dark:#1239A8; --bg:#03081C; --bg2:#050C24; --bg3:#07102E;
      --card:#081230; --card-border:#162050; --text:#CBD5E1;
      --text-muted:#64748B; --white:#F1F5FF; --red:#EF4444;
      --font:'Inter',sans-serif; --mono:'JetBrains Mono',monospace;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:var(--bg); color:var(--text); font-family:var(--font);
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      padding:1rem;
    }

    /* Background glow */
    .bg-glow { position:fixed; border-radius:50%; pointer-events:none; filter:blur(120px); z-index:0; }
    .bg-glow-1 { width:500px;height:500px;background:rgba(26,86,219,0.1);top:-100px;left:-100px; }
    .bg-glow-2 { width:400px;height:400px;background:rgba(26,86,219,0.07);bottom:-100px;right:-100px; }

    .auth-box {
      background:var(--card); border:1px solid var(--card-border);
      border-radius:20px; padding:2.5rem 2rem;
      width:100%; max-width:440px; position:relative; z-index:1;
      box-shadow:0 30px 80px rgba(0,0,0,0.5), 0 0 60px rgba(26,86,219,0.08);
    }

    .auth-logo {
      text-align:center; margin-bottom:2rem;
    }
    .auth-logo img { height:55px; margin-bottom:0.8rem; }
    .auth-logo h1 { font-size:1.4rem; font-weight:800; color:var(--white); }
    .auth-logo p  { font-size:0.82rem; color:var(--text-muted); margin-top:0.3rem; }

    /* Tabs */
    .auth-tabs {
      display:flex; background:var(--bg2); border-radius:10px;
      padding:4px; margin-bottom:1.8rem; gap:4px;
    }
    .auth-tab {
      flex:1; padding:0.6rem; border:none; border-radius:8px;
      background:transparent; color:var(--text-muted);
      font-size:0.85rem; font-weight:600; cursor:pointer;
      transition:all 0.2s; font-family:var(--font);
    }
    .auth-tab.active { background:var(--blue); color:#fff; }

    /* Form */
    .auth-form { display:flex; flex-direction:column; gap:0.9rem; }
    .form-field { display:flex; flex-direction:column; gap:0.35rem; }
    .form-field label { font-size:0.78rem; font-weight:600; color:var(--text-muted); letter-spacing:0.05em; }
    .form-field input {
      background:var(--bg2); border:1px solid var(--card-border);
      border-radius:9px; padding:0.75rem 1rem; color:var(--text);
      font-family:var(--font); font-size:0.9rem; transition:all 0.2s;
    }
    .form-field input:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(26,86,219,0.15); }
    .form-field input::placeholder { color:var(--text-muted); }

    .btn-auth {
      width:100%; background:var(--blue); color:#fff; border:none;
      padding:0.85rem; border-radius:9px; font-size:0.9rem; font-weight:700;
      cursor:pointer; transition:all 0.22s; font-family:var(--font);
      margin-top:0.3rem;
    }
    .btn-auth:hover { background:var(--blue-dark); box-shadow:0 0 28px rgba(26,86,219,0.4); }
    .btn-auth:disabled { opacity:0.6; cursor:not-allowed; }

    /* Divider */
    .auth-divider {
      display:flex; align-items:center; gap:0.8rem;
      margin:1.2rem 0; color:var(--text-muted); font-size:0.75rem;
    }
    .auth-divider::before,.auth-divider::after {
      content:''; flex:1; height:1px; background:var(--card-border);
    }

    /* Social buttons */
    .social-btns { display:flex; flex-direction:column; gap:0.7rem; }
    .btn-social {
      width:100%; background:transparent; color:var(--text);
      border:1px solid var(--card-border); border-radius:9px;
      padding:0.75rem 1rem; font-size:0.86rem; font-weight:600;
      cursor:pointer; transition:all 0.2s; font-family:var(--font);
      display:flex; align-items:center; justify-content:center; gap:0.7rem;
    }
    .btn-social:hover { border-color:rgba(26,86,219,0.5); background:rgba(26,86,219,0.06); color:var(--white); }
    .btn-social svg { flex-shrink:0; }

    /* Error / success */
    .auth-msg {
      padding:0.7rem 1rem; border-radius:8px; font-size:0.83rem;
      margin-bottom:0.5rem; display:none;
    }
    .auth-msg.error   { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.25); color:#FCA5A5; }
    .auth-msg.success { background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.25); color:#86EFAC; }
    .auth-msg.show    { display:block; }

    .auth-back {
      text-align:center; margin-top:1.2rem;
      font-size:0.8rem; color:var(--text-muted);
    }
    .auth-back a { color:var(--blue-bright); text-decoration:none; }
    .auth-back a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <div class="auth-box">
    <div class="auth-logo">
      <img src="/logos/ZK STUDIO SEM FUNDO.png" alt="ZK Studio" />
      <h1>ZK Studio</h1>
      <p>Scripts premium para FiveM</p>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Entrar</button>
      <button class="auth-tab" onclick="switchTab('register')">Criar Conta</button>
    </div>

    <!-- Mensagem de erro/sucesso -->
    <div class="auth-msg" id="authMsg"></div>

    <!-- LOGIN -->
    <div id="loginForm">
      <form class="auth-form" onsubmit="doLogin(event)">
        <div class="form-field">
          <label>EMAIL</label>
          <input type="email" id="loginEmail" placeholder="seu@email.com" required />
        </div>
        <div class="form-field">
          <label>SENHA</label>
          <input type="password" id="loginPass" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-auth" id="loginBtn">Entrar</button>
      </form>

      <div class="auth-divider">ou continue com</div>

      <div class="social-btns">
        <button class="btn-social" onclick="loginGoogle()">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continuar com Google
        </button>
        <button class="btn-social" onclick="loginDiscord()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#5865F2"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057.1 18.079.11 18.1.128 18.113a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
          Continuar com Discord
        </button>
      </div>
    </div>

    <!-- CADASTRO -->
    <div id="registerForm" style="display:none">
      <form class="auth-form" onsubmit="doRegister(event)">
        <div class="form-field">
          <label>SEU NOME</label>
          <input type="text" id="regName" placeholder="Como quer ser chamado?" required />
        </div>
        <div class="form-field">
          <label>EMAIL</label>
          <input type="email" id="regEmail" placeholder="seu@email.com" required />
        </div>
        <div class="form-field">
          <label>SENHA</label>
          <input type="password" id="regPass" placeholder="Mínimo 6 caracteres" required minlength="6" />
        </div>
        <div class="form-field">
          <label>CONFIRMAR SENHA</label>
          <input type="password" id="regPass2" placeholder="Repita a senha" required />
        </div>
        <button type="submit" class="btn-auth" id="regBtn">Criar Conta</button>
      </form>

      <div class="auth-divider">ou continue com</div>
      <div class="social-btns">
        <button class="btn-social" onclick="loginGoogle()">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continuar com Google
        </button>
        <button class="btn-social" onclick="loginDiscord()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#5865F2"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057.1 18.079.11 18.1.128 18.113a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
          Continuar com Discord
        </button>
      </div>
    </div>

    <div class="auth-back">
      <a href="/">← Voltar ao site</a>
    </div>
  </div>

<script>
  // Redireciona se já está logado
  const token = localStorage.getItem('zk_token');
  if (token) {
    fetch('/auth/me', { headers:{ Authorization:'Bearer '+token } })
      .then(r => r.json())
      .then(d => { if (d.user) window.location.href = '/profile.html'; })
      .catch(() => {});
  }

  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
    document.getElementById('loginForm').style.display    = tab==='login'    ? 'block' : 'none';
    document.getElementById('registerForm').style.display = tab==='register' ? 'block' : 'none';
    clearMsg();
  }

  function showMsg(type, text) {
    const el = document.getElementById('authMsg');
    el.className = 'auth-msg '+type+' show';
    el.textContent = text;
  }
  function clearMsg() {
    const el = document.getElementById('authMsg');
    el.className = 'auth-msg';
    el.textContent = '';
  }

  async function doLogin(e) {
    e.preventDefault();
    clearMsg();
    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = 'Entrando...';
    const email    = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPass').value;
    try {
      const r = await fetch('/auth/login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ email, password })
      });
      const d = await r.json();
      if (!r.ok) { showMsg('error', d.error); btn.disabled=false; btn.textContent='Entrar'; return; }
      localStorage.setItem('zk_token', d.token);
      localStorage.setItem('zk_user', JSON.stringify(d.user));
      showMsg('success', 'Bem-vindo, '+d.user.name+'! Redirecionando...');
      setTimeout(() => window.location.href = '/', 1200);
    } catch { showMsg('error', 'Erro de conexão.'); btn.disabled=false; btn.textContent='Entrar'; }
  }

  async function doRegister(e) {
    e.preventDefault();
    clearMsg();
    const pass  = document.getElementById('regPass').value;
    const pass2 = document.getElementById('regPass2').value;
    if (pass !== pass2) { showMsg('error', 'As senhas não coincidem.'); return; }
    const btn = document.getElementById('regBtn');
    btn.disabled=true; btn.textContent='Criando conta...';
    const name  = document.getElementById('regName').value;
    const email = document.getElementById('regEmail').value;
    try {
      const r = await fetch('/auth/register', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ name, email, password: pass })
      });
      const d = await r.json();
      if (!r.ok) { showMsg('error', d.error); btn.disabled=false; btn.textContent='Criar Conta'; return; }
      localStorage.setItem('zk_token', d.token);
      localStorage.setItem('zk_user', JSON.stringify(d.user));
      showMsg('success', 'Conta criada! Redirecionando...');
      setTimeout(() => window.location.href = '/', 1200);
    } catch { showMsg('error', 'Erro de conexão.'); btn.disabled=false; btn.textContent='Criar Conta'; }
  }

  function loginGoogle() {
    showMsg('error', 'Login com Google em breve. Use email/senha por enquanto.');
  }
  function loginDiscord() {
    showMsg('error', 'Login com Discord em breve. Use email/senha por enquanto.');
  }
</script>
</body>
</html>
