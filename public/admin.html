<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZK Studio — Painel de Suporte</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue:#1A56DB; --blue-light:#4F8EF7; --blue-bright:#60A5FA;
      --blue-dark:#1239A8; --bg:#03081C; --bg2:#050C24; --bg3:#07102E;
      --card:#081230; --card-border:#162050; --text:#CBD5E1;
      --text-muted:#64748B; --white:#F1F5FF;
      --green:#22C55E; --red:#EF4444;
      --font:'Inter',sans-serif; --mono:'JetBrains Mono',monospace;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:var(--font); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

    /* HEADER */
    .admin-header {
      background:var(--bg3); border-bottom:1px solid rgba(26,86,219,0.2);
      padding:0.9rem 1.5rem; display:flex; align-items:center; gap:1rem; flex-shrink:0;
    }
    .admin-header img { height:36px; }
    .admin-header h1 { font-size:1rem; font-weight:700; color:var(--white); }
    .admin-header span { font-size:0.75rem; color:var(--text-muted); margin-left:0.3rem; }
    .header-status { margin-left:auto; display:flex; align-items:center; gap:0.5rem; font-size:0.8rem; color:var(--green); }
    .status-dot { width:8px; height:8px; border-radius:50%; background:var(--green); animation:pulse-green 2s infinite; }
    @keyframes pulse-green { 0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.4)} 50%{box-shadow:0 0 0 6px rgba(34,197,94,0)} }

    /* LAYOUT */
    .admin-body { display:flex; flex:1; overflow:hidden; }

    /* SIDEBAR — lista de chats */
    .sidebar {
      width:280px; background:var(--bg2);
      border-right:1px solid rgba(26,86,219,0.15);
      display:flex; flex-direction:column; flex-shrink:0;
    }
    .sidebar-title {
      padding:1rem 1.2rem; font-size:0.7rem; font-weight:700;
      color:var(--text-muted); letter-spacing:0.12em; text-transform:uppercase;
      border-bottom:1px solid rgba(26,86,219,0.1);
      display:flex; align-items:center; justify-content:space-between;
    }
    .badge-count {
      background:var(--blue); color:#fff; font-size:0.65rem;
      padding:0.1rem 0.5rem; border-radius:10px; font-weight:700;
    }
    .session-list { flex:1; overflow-y:auto; padding:0.5rem; }
    .session-list::-webkit-scrollbar { width:4px; }
    .session-list::-webkit-scrollbar-thumb { background:var(--blue); border-radius:2px; }
    .session-item {
      padding:0.9rem 1rem; border-radius:10px; cursor:pointer;
      transition:all 0.2s; border:1px solid transparent; margin-bottom:0.4rem;
      position:relative;
    }
    .session-item:hover { background:var(--card); border-color:rgba(26,86,219,0.2); }
    .session-item.active { background:var(--card); border-color:rgba(26,86,219,0.45); }
    .session-item .s-name { font-size:0.88rem; font-weight:600; color:var(--white); margin-bottom:0.2rem; }
    .session-item .s-preview { font-size:0.75rem; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .session-item .s-time { font-size:0.68rem; color:var(--text-muted); position:absolute; top:0.9rem; right:0.8rem; }
    .session-item .s-unread {
      position:absolute; bottom:0.9rem; right:0.8rem;
      width:16px; height:16px; border-radius:50%; background:var(--blue);
      font-size:0.6rem; font-weight:700; color:#fff;
      display:flex; align-items:center; justify-content:center;
    }
    .no-sessions {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      height:100%; gap:0.8rem; color:var(--text-muted); font-size:0.85rem; text-align:center; padding:2rem;
    }
    .no-sessions .ns-icon { font-size:2.5rem; opacity:0.4; }

    /* CHAT AREA */
    .chat-area {
      flex:1; display:flex; flex-direction:column; overflow:hidden;
      background:var(--bg);
    }
    .chat-empty {
      flex:1; display:flex; flex-direction:column; align-items:center;
      justify-content:center; gap:1rem; color:var(--text-muted);
    }
    .chat-empty .ce-icon { font-size:3rem; opacity:0.3; }
    .chat-empty p { font-size:0.9rem; }

    /* Chat header */
    .chat-header {
      padding:0.9rem 1.5rem; background:var(--bg3);
      border-bottom:1px solid rgba(26,86,219,0.15);
      display:flex; align-items:center; gap:0.9rem; flex-shrink:0;
    }
    .chat-header .ch-avatar {
      width:36px; height:36px; border-radius:50%;
      background:linear-gradient(135deg,#334155,#1e293b);
      display:flex; align-items:center; justify-content:center; font-size:1.1rem;
    }
    .chat-header .ch-name { font-size:0.92rem; font-weight:700; color:var(--white); }
    .chat-header .ch-status { font-size:0.72rem; color:var(--green); }
    .btn-fechar {
      margin-left:auto; background:rgba(239,68,68,0.15); color:var(--red);
      border:1px solid rgba(239,68,68,0.3); padding:0.45rem 1rem;
      border-radius:7px; font-size:0.78rem; font-weight:700; cursor:pointer;
      transition:all 0.2s; font-family:var(--font);
    }
    .btn-fechar:hover { background:rgba(239,68,68,0.25); }

    /* Messages */
    .chat-messages {
      flex:1; overflow-y:auto; padding:1.2rem 1.5rem;
      display:flex; flex-direction:column; gap:0.8rem;
    }
    .chat-messages::-webkit-scrollbar { width:4px; }
    .chat-messages::-webkit-scrollbar-thumb { background:var(--blue); border-radius:2px; }

    .msg { display:flex; gap:0.6rem; align-items:flex-end; max-width:75%; }
    .msg.from-visitor { align-self:flex-start; }
    .msg.from-admin   { align-self:flex-end; flex-direction:row-reverse; }

    .msg-avatar {
      width:28px; height:28px; border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center; font-size:0.85rem;
    }
    .msg.from-visitor .msg-avatar { background:linear-gradient(135deg,#334155,#1e293b); }
    .msg.from-admin   .msg-avatar { background:linear-gradient(135deg,var(--blue),var(--blue-dark)); overflow:hidden; }
    .msg.from-admin .msg-avatar img { width:100%; height:100%; object-fit:contain; border-radius:50%; }

    .msg-bubble {
      padding:0.6rem 0.9rem; border-radius:12px; font-size:0.86rem; line-height:1.5;
      position:relative;
    }
    .msg.from-visitor .msg-bubble {
      background:var(--card); border:1px solid rgba(255,255,255,0.06); color:var(--text);
      border-bottom-left-radius:3px;
    }
    .msg.from-admin .msg-bubble {
      background:var(--blue); color:#fff; border-bottom-right-radius:3px;
    }
    .msg-time { font-size:0.62rem; color:var(--text-muted); margin-top:0.3rem; text-align:right; }

    /* Input */
    .chat-input-area {
      padding:1rem 1.5rem; background:var(--bg3);
      border-top:1px solid rgba(26,86,219,0.15);
      display:flex; gap:0.8rem; align-items:flex-end; flex-shrink:0;
    }
    .chat-input-area textarea {
      flex:1; background:var(--card); border:1px solid rgba(26,86,219,0.25);
      border-radius:10px; padding:0.75rem 1rem; color:var(--text);
      font-family:var(--font); font-size:0.88rem; resize:none;
      min-height:42px; max-height:120px; transition:border-color 0.2s;
    }
    .chat-input-area textarea:focus { outline:none; border-color:var(--blue); }
    .chat-input-area textarea::placeholder { color:var(--text-muted); }
    .btn-send {
      width:42px; height:42px; border-radius:10px; border:none;
      background:var(--blue); color:#fff; cursor:pointer; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      transition:all 0.2s; font-size:1.1rem;
    }
    .btn-send:hover { background:var(--blue-dark); box-shadow:0 0 20px rgba(26,86,219,0.4); }

    /* Typing indicator */
    .typing { display:flex; gap:4px; align-items:center; padding:0.4rem 0; }
    .typing span { width:6px; height:6px; border-radius:50%; background:var(--text-muted); animation:typing 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay:0.2s; }
    .typing span:nth-child(3) { animation-delay:0.4s; }
    @keyframes typing { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-6px);opacity:1} }

    /* Sessão fechada */
    .chat-closed-banner {
      background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.2);
      border-radius:8px; padding:0.6rem 1rem; text-align:center;
      font-size:0.8rem; color:var(--red); margin:0 1.5rem 0.8rem;
    }
  </style>
</head>
<body>

<div class="admin-header">
  <img src="/logos/ZK STUDIO SEM FUNDO.png" alt="ZK" />
  <div>
    <h1>Painel de Suporte <span>— ZK Studio</span></h1>
  </div>
  <div class="header-status">
    <div class="status-dot"></div>
    Online
  </div>
</div>

<div class="admin-body">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-title">
      Conversas ativas
      <span class="badge-count" id="countBadge">0</span>
    </div>
    <div class="session-list" id="sessionList">
      <div class="no-sessions">
        <div class="ns-icon">💬</div>
        <p>Aguardando visitantes...</p>
      </div>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area" id="chatArea">
    <div class="chat-empty">
      <div class="ce-icon">👋</div>
      <p>Selecione uma conversa para responder</p>
    </div>
  </div>

</div>

<script>
  let sessions = {};
  let activeId = null;
  let lastMsgCount = {};

  // Polling de sessões
  async function pollSessions() {
    try {
      const r = await fetch('/chat/admin/sessions');
      const list = await r.json();

      // Merge
      const newMap = {};
      list.forEach(s => { newMap[s.id] = s; });

      // Detecta novas mensagens
      Object.keys(newMap).forEach(id => {
        if (lastMsgCount[id] !== undefined && newMap[id].messages.length > lastMsgCount[id]) {
          if (id !== activeId) {
            playNotif();
            markUnread(id, newMap[id].messages.length - lastMsgCount[id]);
          }
        }
        lastMsgCount[id] = newMap[id].messages.length;
      });

      sessions = newMap;
      renderSidebar();
      if (activeId && sessions[activeId]) renderChat(activeId);
    } catch(e) {}
    setTimeout(pollSessions, 200);
  }

  function renderSidebar() {
    const el = document.getElementById('sessionList');
    const ids = Object.keys(sessions);
    document.getElementById('countBadge').textContent = ids.length;

    if (!ids.length) {
      el.innerHTML = '<div class="no-sessions"><div class="ns-icon">💬</div><p>Aguardando visitantes...</p></div>';
      return;
    }
    el.innerHTML = ids.map(id => {
      const s = sessions[id];
      const last = s.messages[s.messages.length - 1];
      const preview = last ? last.text.slice(0, 38) + (last.text.length > 38 ? '…' : '') : '';
      const time = last ? last.time : '';
      const unread = (unreadCounts[id] || 0);
      return `<div class="session-item ${id === activeId ? 'active' : ''}" onclick="selectSession('${id}')">
        <div class="s-name">👤 ${s.name}</div>
        <div class="s-preview">${preview}</div>
        <div class="s-time">${time}</div>
        ${unread > 0 ? `<div class="s-unread">${unread}</div>` : ''}
      </div>`;
    }).join('');
  }

  const unreadCounts = {};
  function markUnread(id, n) {
    unreadCounts[id] = (unreadCounts[id] || 0) + n;
    renderSidebar();
  }

  function selectSession(id) {
    activeId = id;
    unreadCounts[id] = 0;
    lastMsgCount[id] = sessions[id]?.messages.length || 0;
    renderSidebar();
    renderChat(id);
  }

  function renderChat(id) {
    const s = sessions[id];
    if (!s) return;
    const area = document.getElementById('chatArea');
    const closed = !s.open;

    area.innerHTML = `
      <div class="chat-header">
        <div class="ch-avatar">👤</div>
        <div>
          <div class="ch-name">${s.name}</div>
          <div class="ch-status">${closed ? '🔴 Encerrada' : '🟢 Online'}</div>
        </div>
        ${!closed ? `<button class="btn-fechar" onclick="fecharChat('${id}')">✕ Encerrar</button>` : ''}
      </div>
      <div class="chat-messages" id="msgs-${id}">
        ${renderMsgs(s.messages)}
      </div>
      ${closed ? `<div class="chat-closed-banner">Conversa encerrada</div>` : ''}
      ${!closed ? `
      <div class="chat-input-area">
        <textarea id="adminInput" placeholder="Digite sua resposta..." rows="1"
          onkeydown="handleKey(event,'${id}')"
          oninput="autoResize(this)"></textarea>
        <button class="btn-send" onclick="adminSend('${id}')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
        </button>
      </div>` : ''}
    `;
    scrollMsgs(id);
    if (!closed) document.getElementById('adminInput')?.focus();
  }

  function renderMsgs(msgs) {
    return msgs.map(m => `
      <div class="msg from-${m.from}">
        <div class="msg-avatar">
          ${m.from === 'admin'
            ? '<img src="/logos/ZK STUDIO SEM FUNDO.png" alt="ZK" />'
            : '👤'}
        </div>
        <div>
          <div class="msg-bubble">${escHtml(m.text)}</div>
          <div class="msg-time">${m.time}</div>
        </div>
      </div>
    `).join('');
  }

  function scrollMsgs(id) {
    setTimeout(() => {
      const el = document.getElementById('msgs-' + id);
      if (el) el.scrollTop = el.scrollHeight;
    }, 50);
  }

  async function adminSend(id) {
    const inp = document.getElementById('adminInput');
    if (!inp) return;
    const text = inp.value.trim();
    if (!text) return;
    inp.value = '';
    inp.style.height = '';
    await fetch('/chat/admin/reply', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ id, text })
    });
  }

  async function fecharChat(id) {
    if (!confirm('Encerrar esta conversa?')) return;
    await fetch('/chat/admin/close', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ id })
    });
    activeId = null;
    delete sessions[id];
    renderSidebar();
    document.getElementById('chatArea').innerHTML = '<div class="chat-empty"><div class="ce-icon">✅</div><p>Conversa encerrada.</p></div>';
  }

  function handleKey(e, id) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); adminSend(id); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  function playNotif() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator(); const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 880; g.gain.setValueAtTime(0.3, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      o.start(); o.stop(ctx.currentTime + 0.3);
    } catch(_) {}
  }

  pollSessions();
</script>
</body>
</html>
